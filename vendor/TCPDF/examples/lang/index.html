<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Acceso Denegado</title>
    <!-- Estilo oficial del INAOE -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            padding: 20px;
            max-width: 600px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header img {
            height: 60px;
            margin-right: 15px;
        }
        h1 {
            font-size: 24px;
            color: #d32f2f;
            margin: 10px 0;
        }
        p {
            font-size: 18px;
            line-height: 1.5;
            margin: 10px 0;
        }
        .btn-regresar {
            margin: 20px 0;
            padding: 10px 20px;
            font-size: 16px;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-regresar:hover {
            background-color: #0056b3;
        }
        footer {
            margin-top: 20px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://www.inaoep.mx/archivos2020s/en/logo_inaoe.png" alt="Logo del INAOE">
        </div>
        <h1>403 - Acceso Denegado</h1>
        <p>
            Lo sentimos, no tiene permisos para acceder a este contenido.
            Si cree que esto es un error, por favor contacte al administrador del sistema.
        </p>
        <!-- Botón para regresar -->
        <button class="btn-regresar" onclick="window.location.href='../../../../';">
            Regresar
        </button>
        <footer>
            INAOE
        </footer>
    </div>

    <script>
        // Borrar todo el sessionStorage al cargar la página
        sessionStorage.clear();
    </script>
</body>
</html>
