<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://kit.fontawesome.com/1e996f8cdc.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.css">

    <title>INAOEP</title>

    <style>
        body {
            padding-top: 65px;
        }
    </style>

</head>

<body class="bg-dark">

    <div class="container-fluid">

        <div class="row">
    
            <div class="col">
    
                <div class="position-absolute top-50 start-50 translate-middle">
                    
    
                    <div class="row">
                        <div class="col">
                            <hr class="text-white">
                            <h1 class="mt-3 text-white">Inicio de sesión</h1>
                        </div>
    
                    </div>
    
                    <form id="loginForm" novalidate>
                        <div class="row mb-3">
                            <div class="col-lg-12 col-sm-12">
                                <label for="username" class="form-label text-white">Usuario</label>
                                <input type="text" class="form-control" id="username">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-lg-12 col-sm-12">
                                <label for="password" class="form-label text-white">Contraseña</label>
                                <input type="password" class="form-control" id="password">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-lg-12 col-sm-12">
                                <button class="btn btn-primary w-100" type="submit">Iniciar sesión</button>
                            </div>
                        </div>
                    </form>
                    
    
                    <div class="row">
                        <div class="col">
                            <div class="alert alert-danger mt-2" role="alert" id="alert_error" style="display:none"></div>
                        </div>
                    </div>
    
                </div>
            </div>
    
        </div>
    </div>
    

</body>

<script src="/vendor/jquery/jquery.min.js"></script>
<script src="https://unpkg.com/feather-icons"></script>
<script src="/vendor/bootstrap/js/bootstrap.js"></script>
<script src="/src/scripts/Tools.js"></script>

<script src="/controllers/LoginController.js"></script>

</html>
